name: compu-palace

services:
  db:
    container_name: compu-palace-db
    image: compu-palace-db
    build:
      context: ./database
      dockerfile: Dockerfile
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    container_name: compu-palace-api
    image: compu-palace-api
    build:
      context: ./backend
      dockerfile: CompuPalace.Api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=CompuPalace;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: compu-palace-web
    image: compu-palace-web
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  sqlserver-data:
    name: compu-palace-data
